<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Painel Interno | Race Low Poly</title>
  <link rel="icon" href="assets/race-low-poly-icon.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="cursor-glow"></div>

  <main class="admin-page">
    <div class="admin-wrap">
      <section class="admin-card lock-screen" id="lockScreen">
        <span class="eyebrow">acesso restrito</span>
        <h2>Painel Admin</h2>
        <p>Entre com o usuário e senha configurados no Render para publicar atualizações no PostgreSQL.</p>

        <form class="admin-form" id="loginForm">
          <label>
            Usuário
            <input type="text" id="adminUser" autocomplete="username" required />
          </label>

          <label>
            Senha
            <input type="password" id="adminPassword" autocomplete="current-password" required />
          </label>

          <button class="btn primary" type="submit">Entrar</button>
        </form>

        <div class="admin-alert" id="adminAlert"></div>
      </section>

      <section class="admin-card hidden" id="adminPanel">
        <span class="eyebrow">ztr company studio</span>
        <h2>Publicar atualização</h2>
        <p>As atualizações publicadas aqui serão salvas no PostgreSQL e ficarão visíveis para todos na página pública.</p>

        <form class="admin-form" id="updateForm">
          <label>
            Título da atualização
            <input type="text" id="updateTitle" placeholder="Ex: Novo sistema de ranking" required />
          </label>

          <label>
            Data
            <input type="date" id="updateDate" required />
          </label>

          <label>
            Versão
            <input type="text" id="updateVersion" placeholder="Ex: Dev Build 0.2" />
          </label>

          <label>
            Categoria
            <select id="updateCategory">
              <option value="Desenvolvimento">Desenvolvimento</option>
              <option value="Gameplay">Gameplay</option>
              <option value="Dashboard">Dashboard</option>
              <option value="Visual">Visual</option>
              <option value="Correções">Correções</option>
            </select>
          </label>

          <label>
            Imagem da atualização
            <input type="file" id="updateImage" accept="image/*" />
          </label>

          <label>
            Ou URL da imagem
            <input type="url" id="updateImageUrl" placeholder="https://..." />
          </label>

          <label>
            Descrição
            <textarea id="updateDescription" placeholder="Escreva os detalhes da atualização..." required></textarea>
          </label>

          <div class="admin-toolbar">
            <button class="btn primary" type="submit">Publicar atualização</button>
            <button class="btn ghost" type="button" id="logoutBtn">Sair</button>
            <a class="btn ghost" href="atualizacoes.html" target="_blank">Ver página pública</a>
          </div>
        </form>

        <div class="admin-list" id="adminUpdatesList"></div>
      </section>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
